name: TouchFish Agent Trigger

on:
  push:
    branches-ignore:
      - master
      - main

env:
  AGENT_IMAGE: touchfish-agent:latest

jobs:
  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      agent_name: ${{ steps.parse.outputs.agent_name }}
      should_run: ${{ steps.parse.outputs.should_run }}
    steps:
      - name: Parse commit message for agent
        id: parse
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          # Extract agent name from commit message
          # Format: @AGENT_NAME or [AGENT_NAME]
          if [[ "$COMMIT_MSG" =~ @(PO|DEV|TESTER) ]]; then
            AGENT_NAME="${BASH_REMATCH[1]}"
            echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Detected agent: $AGENT_NAME"
          elif [[ "$COMMIT_MSG" =~ \[(PO|DEV|TESTER)\] ]]; then
            AGENT_NAME="${BASH_REMATCH[1]}"
            echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Detected agent: $AGENT_NAME"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No agent trigger found in commit message"
          fi

  run-agent:
    needs: parse-trigger
    if: needs.parse-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      temp_branch: ${{ steps.temp-branch.outputs.temp_branch }}
      has_changes: ${{ steps.push.outputs.has_changes }}
    env:
      AGENT_NAME: ${{ needs.parse-trigger.outputs.agent_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "TouchFish Agent"
          git config --global user.email "agent@touchfish.local"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get commit details
        id: commit
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create temp branch for agent work
        id: temp-branch
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TEMP_BRANCH="agent/${{ env.AGENT_NAME }}/${TIMESTAMP}"
          git checkout -b "$TEMP_BRANCH"
          echo "temp_branch=$TEMP_BRANCH" >> $GITHUB_OUTPUT

      - name: Build Agent Docker Image
        run: |
          docker build -t ${{ env.AGENT_IMAGE }} .

      - name: Prepare agent home directory
        run: mkdir -p /tmp/agent-home

      - name: Run Agent Container
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v /tmp/agent-home:/home/agent \
            -e HOME=/home/agent \
            -e AGENT_NAME="${{ env.AGENT_NAME }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e CLAUDE_CODE_OAUTH_TOKEN="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" \
            -e COMMIT_SHA="${{ steps.commit.outputs.sha }}" \
            -e COMMIT_MESSAGE="${{ steps.commit.outputs.message }}" \
            -e BRANCH_NAME="${{ steps.commit.outputs.branch }}" \
            -e REPO_NAME="${{ github.repository }}" \
            -w /workspace \
            ${{ env.AGENT_IMAGE }}

      - name: Push changes to temp branch
        id: push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Agent ${{ env.AGENT_NAME }} session completed

            Co-Authored-By: TouchFish Agent <agent@touchfish.local>"
            git push origin "${{ steps.temp-branch.outputs.temp_branch }}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  create-pr:
    needs: [parse-trigger, run-agent]
    if: needs.parse-trigger.outputs.should_run == 'true' && needs.run-agent.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.run-agent.outputs.temp_branch }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[${{ needs.parse-trigger.outputs.agent_name }}] Session: ${{ needs.run-agent.outputs.temp_branch }}" \
            --body "## Agent Session

          **Agent:** ${{ needs.parse-trigger.outputs.agent_name }}
          **Source Branch:** ${{ needs.run-agent.outputs.temp_branch }}
          **Target Branch:** ${{ github.ref_name }}
          **Triggered by:** ${{ github.event.head_commit.message }}

          ---

          ### Changes
          This PR contains changes made by the ${{ needs.parse-trigger.outputs.agent_name }} agent.

          Please review the changes in:
          - \`agents/${{ needs.parse-trigger.outputs.agent_name }}/history.md\` for session details

          ---
          *Generated by TouchFish Agent System*" \
            --base "${{ github.ref_name }}" \
            --head "${{ needs.run-agent.outputs.temp_branch }}"

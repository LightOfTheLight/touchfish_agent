name: TouchFish Agent Trigger

on:
  push:
    branches-ignore:
      - master
      - main
  pull_request:
    types: [closed]

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE: ghcr.io/lightofthelight/touchfish-agent:latest

jobs:
  parse-trigger:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      agent_name: ${{ steps.parse.outputs.agent_name }}
      should_run: ${{ steps.parse.outputs.should_run }}
    steps:
      - name: Parse commit message for agent
        id: parse
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          # Extract agent name from commit message
          # Format: @AGENT_NAME or [AGENT_NAME]
          if [[ "$COMMIT_MSG" =~ @(PO|DEV|TESTER) ]]; then
            AGENT_NAME="${BASH_REMATCH[1]}"
            echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Detected agent: $AGENT_NAME"
          elif [[ "$COMMIT_MSG" =~ \[(PO|DEV|TESTER)\] ]]; then
            AGENT_NAME="${BASH_REMATCH[1]}"
            echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Detected agent: $AGENT_NAME"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No agent trigger found in commit message"
          fi

  run-agent:
    needs: parse-trigger
    if: needs.parse-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    outputs:
      temp_branch: ${{ steps.temp-branch.outputs.temp_branch }}
      has_changes: ${{ steps.push.outputs.has_changes }}
    env:
      AGENT_NAME: ${{ needs.parse-trigger.outputs.agent_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "TouchFish Agent"
          git config --global user.email "agent@touchfish.local"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get commit details
        id: commit
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create temp branch for agent work
        id: temp-branch
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TEMP_BRANCH="agent/${{ env.AGENT_NAME }}/${TIMESTAMP}"
          git checkout -b "$TEMP_BRANCH"
          echo "temp_branch=$TEMP_BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Agent Docker Image
        run: |
          docker pull ${{ env.AGENT_IMAGE }}

      - name: Prepare agent home directory
        run: mkdir -p /tmp/agent-home

      - name: Run Agent Container
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v /tmp/agent-home:/home/agent \
            -e HOME=/home/agent \
            -e AGENT_NAME="${{ env.AGENT_NAME }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e CLAUDE_CODE_OAUTH_TOKEN="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" \
            -e COMMIT_SHA="${{ steps.commit.outputs.sha }}" \
            -e COMMIT_MESSAGE="${{ steps.commit.outputs.message }}" \
            -e BRANCH_NAME="${{ steps.commit.outputs.branch }}" \
            -e REPO_NAME="${{ github.repository }}" \
            -w /workspace \
            ${{ env.AGENT_IMAGE }}

      - name: Push changes to temp branch
        id: push
        run: |
          # Stage and commit any remaining unstaged changes
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Agent ${{ env.AGENT_NAME }} session completed

            Co-Authored-By: TouchFish Agent <agent@touchfish.local>"
          fi

          # Check if agent made any commits (staged or via Claude Code)
          if git log --oneline ${{ github.ref_name }}..${{ steps.temp-branch.outputs.temp_branch }} | grep -q .; then
            git push origin "${{ steps.temp-branch.outputs.temp_branch }}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to push"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  create-pr:
    needs: [parse-trigger, run-agent]
    if: needs.parse-trigger.outputs.should_run == 'true' && needs.run-agent.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.run-agent.outputs.temp_branch }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[${{ needs.parse-trigger.outputs.agent_name }}] Session: ${{ needs.run-agent.outputs.temp_branch }}" \
            --body "## Agent Session

          **Agent:** ${{ needs.parse-trigger.outputs.agent_name }}
          **Source Branch:** ${{ needs.run-agent.outputs.temp_branch }}
          **Target Branch:** ${{ github.ref_name }}
          **Triggered by:** ${{ github.event.head_commit.message }}

          ---

          ### Changes
          This PR contains changes made by the ${{ needs.parse-trigger.outputs.agent_name }} agent.

          Please review the changes in:
          - \`agents/${{ needs.parse-trigger.outputs.agent_name }}/history.md\` for session details

          ---
          *Generated by TouchFish Agent System*" \
            --base "${{ github.ref_name }}" \
            --head "${{ needs.run-agent.outputs.temp_branch }}"

  chain-next-agent:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'agent/PO/') ||
       startsWith(github.event.pull_request.head.ref, 'agent/DEV/') ||
       startsWith(github.event.pull_request.head.ref, 'agent/TESTER/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine next agent
        id: next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          if [[ "$HEAD_REF" == agent/PO/* ]]; then
            echo "should_chain=true" >> $GITHUB_OUTPUT
            echo "message=@DEV Implement requirements from PO session" >> $GITHUB_OUTPUT
          elif [[ "$HEAD_REF" == agent/DEV/* ]]; then
            echo "should_chain=true" >> $GITHUB_OUTPUT
            echo "message=@TESTER Verify implementation from DEV session" >> $GITHUB_OUTPUT
          elif [[ "$HEAD_REF" == agent/TESTER/* ]]; then
            # Scan TESTER PR commits for @PO or @DEV markers indicating issues found
            PR_NUMBER="${{ github.event.pull_request.number }}"
            COMMITS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits" --jq '.[].commit.message')
            if echo "$COMMITS" | grep -qoE '@(PO|DEV)'; then
              TARGET=$(echo "$COMMITS" | grep -oE '@(PO|DEV)' | tail -1 | tr -d '@')
              echo "should_chain=true" >> $GITHUB_OUTPUT
              echo "message=@${TARGET} Address issues found by TESTER" >> $GITHUB_OUTPUT
            else
              echo "should_chain=false" >> $GITHUB_OUTPUT
              echo "All tests passed - pipeline complete"
            fi
          fi

      - name: Checkout target branch
        if: steps.next.outputs.should_chain == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        if: steps.next.outputs.should_chain == 'true'
        run: |
          git config user.name "TouchFish Agent"
          git config user.email "agent@touchfish.local"

      - name: Push trigger commit for next agent
        if: steps.next.outputs.should_chain == 'true'
        run: |
          git commit --allow-empty -m "${{ steps.next.outputs.message }}

          Chained from merged PR #${{ github.event.pull_request.number }}
          Source branch: ${{ github.event.pull_request.head.ref }}"
          git push
